name: Sausage Store Deploy

on:
  push:
    branches:
      - main

env:
  NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: ${{ secrets.SAUSAGE_STORE_NAMESPACE}}
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
#  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}

jobs:
  build_and_push_to_docker_hub:
      name: Push Docker image to DockerHub
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repo
          uses: actions/checkout@v3
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v2
        - name: Login to Docker 
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        - name: Push Backend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/sausage-backend:latest
            build-args: |
              VERSION=${{ github.sha }}
        - name: Push Frontend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./frontend/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/sausage-frontend:latest
        - name: Push Backend-report to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend-report/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/sausage-backend-report:latest
  # Упаковываем helm-чарт и пушим его в Nexus
  add_helm_chart_to_nexus:
    name: Add Helm Chart To Nexus
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0

      - name: Package Helm chart
        run: |
          cd sausage-store-chart
          helm package . --version 0.1.0 --app-version ${{ github.sha }}
          mv sausage-store-*.tgz ../sausage-store-chart.tgz

      - name: Upload to Nexus Helm repo
        run: |
          curl -u "${{ env.NEXUS_HELM_REPO_USER }}:${{ env.NEXUS_HELM_REPO_PASSWORD }}" \
              -X POST \
              "${{ env.NEXUS_HELM_REPO }}/sausage-store-chart.tgz" \
              -H "Content-Type: application/gzip" \
              --data-binary "@sausage-store-chart.tgz"

    # Деплоим приложения в кластер Kubernetes с помощью helm-чарт
  deploy_helm_chart_to_kubernetes:
    name: Deploy Helm Chart To Kubernetes
    runs-on: ubuntu-latest
    needs: add_helm_chart_to_nexus
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0

      - name: Add Nexus Helm repo
        run: |
          helm repo add nexus "${{ env.NEXUS_HELM_REPO }}" \
            --username "${{ env.NEXUS_HELM_REPO_USER }}" \
            --password "${{ env.NEXUS_HELM_REPO_PASSWORD }}"
          helm repo update

      - name: Debug Helm repo
        run: |
          echo "Available repos:"
          helm repo list
          echo "Search for chart:"
          helm search repo nexus/sausage-store || echo "Chart not found"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ env.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          # Проверка, что namespace задан
          if [ -z "${{ env.SAUSAGE_STORE_NAMESPACE }}" ]; then
            echo "ERROR: SAUSAGE_STORE_NAMESPACE is empty"
            exit 1
          fi

          helm upgrade --install sausage-store \
            nexus/sausage-store \
            --namespace "${{ env.SAUSAGE_STORE_NAMESPACE }}" \
            --create-namespace \
            --set global.imagePullPolicy=Always \
            --set backend.image=${{ secrets.DOCKER_USER }}/sausage-backend:${{ github.sha }} \
            --set frontend.image=${{ secrets.DOCKER_USER }}/sausage-frontend:${{ github.sha }} \
            --set backendReport.image=${{ secrets.DOCKER_USER }}/sausage-backend-report:${{ github.sha }} \
            --set infra.postgresql.env.POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --set infra.mongodb.env.MONGO_INITDB_ROOT_PASSWORD="${{ secrets.MONGO_PASSWORD }}" \
            --set backend.env.postgresPassword="${{ secrets.POSTGRES_PASSWORD }}"