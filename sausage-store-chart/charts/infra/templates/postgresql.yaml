apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
data:
  password: {{ .Values.infra.postgresql.env.POSTGRES_PASSWORD | b64enc | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
data:
  POSTGRES_DB: {{ .Values.infra.postgresql.env.POSTGRES_DB }}
  POSTGRES_USER: {{ .Values.infra.postgresql.env.POSTGRES_USER }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.infra.postgresql.image }}
          ports:
            - containerPort: {{ .Values.infra.postgresql.containerPort }}
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.infra.postgresql.resources | nindent 12 }}
      volumes:
        - name: postgres-data
          hostPath:
            path: /data/postgresql
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: {{ .Values.infra.postgresql.containerPort }}
  clusterIP: None